    <main>
        <div class="page-header">
            <div class="container">
                <h1>Contact Me</h1>
                <p>Have a question or want to connect? Fill out the form below.</p>
            </div>
        </div>

        <section class="contact-section">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-7">
                        <div class="section-title">Send a Message</div>
                        <div class="title-underline"></div>

                        <form action="">
                            <div class="mb-3">
                                <label for="firstname" class="form-label">First Name</label>
                                <input type="text" class="form-control" id="firstname" placeholder="First name"
                                    name="firstname">
                            </div>
                            <div class="mb-3">
                                <label for="lastname" class="form-label">Last Name</label>
                                <input type="text" class="form-control" id="lastname" placeholder="Last name"
                                    name="lastname">
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" placeholder="Enter email"
                                    name="email">
                            </div>
                            <div class="mb-3">
                                <label for="subject" class="form-label">Subject</label>
                                <input type="text" class="form-control" id="subject" placeholder="What is this about?"
                                    name="subject">
                            </div>
                            <div class="mb-3">
                                <label for="message" class="form-label">Message</label>
                                <textarea class="form-control" id="message" name="message" rows="4"
                                    placeholder="Your message here..."></textarea>
                            </div>
                            <div class="mb-3 form-check">
                                <input class="form-check-input" type="checkbox" name="subscribe" id="subscribe">
                                <label class="form-check-label" for="subscribe">
                                    Subscribe to updates
                                </label>
                            </div>
                            <button type="submit" class="btn btn-info text-dark">Submit</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
